version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: second_brain_db
    environment:
      POSTGRES_USER: second_brain_user
      POSTGRES_PASSWORD: supersecret
      POSTGRES_DB: second_brain
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
